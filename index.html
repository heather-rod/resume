              <div className="p-4 md:p-8 max-w-7xl mx-auto">

        // --- VIEWER COMPONENT ---
        function Viewer({ data }) {
          const [activeJobId, setActiveJobId] = useState(data.jobs[0]?.id);
          const activeJob = data.jobs.find(j => j.id === activeJobId) || data.jobs[0];
          const chartRef = useRef(null);

          useEffect(() => {
            const scriptId = 'chartjs-script';
            let chartInstance = null;

            const renderChart = () => {
              if (chartRef.current && window.Chart) {
                window.Chart.defaults.font.family = "'Inter', sans-serif";
                window.Chart.defaults.color = '#cbd5e1';

                const wrap = (str) => {
                    const words = str.split(' ');
                    let lines = [], current = '';
                    words.forEach(w => {
                        if((current + w).length > 14) { lines.push(current); current = w + ' '; } 
                        else { current += w + ' '; }
                    });
                    if(current) lines.push(current.trim());
                    return lines;
                };

                chartInstance = new window.Chart(chartRef.current, {
                  type: 'radar',
                  data: {
                    labels: [wrap('Design Thinking'), wrap('User Research'), wrap('Audience Data'), wrap('Sentiment'), wrap('Measurement')],
                    datasets: [{
                      label: 'Skill Level',
                      data: [95, 85, 90, 85, 95],
                      backgroundColor: 'rgba(57, 255, 20, 0.15)',
                      borderColor: '#39ff14',
                      pointBackgroundColor: '#000',
                      pointBorderColor: '#00ffff',
                      pointHoverBackgroundColor: '#ff00ff',
                      borderWidth: 2
                    }]
                  },
                  options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    scales: {
                      r: {
                        angleLines: { color: 'rgba(255,255,255,0.1)' },
                        grid: { color: 'rgba(255,255,255,0.1)' },
                        pointLabels: { font: { size: 11, family: "'VT323', monospace" }, color: '#39ff14' },
                        ticks: { display: false, min: 0, max: 100 }
                      }
                    },
                    plugins: {
                      legend: { display: false },
                      tooltip: { backgroundColor: '#000', titleColor: '#00ffff', bodyColor: '#fff', borderColor: '#ff00ff', borderWidth: 1 }
                    }
                  }
                });
              }
            };

            if (!document.getElementById(scriptId)) {
              const script = document.createElement('script');
              script.id = scriptId;
              script.src = "https://cdn.jsdelivr.net/npm/chart.js";
              script.async = true;
              script.onload = renderChart;
              document.body.appendChild(script);
            } else {
              if (window.Chart) renderChart();
            }

            return () => { if (chartInstance) chartInstance.destroy(); };
          }, [data]);

          return (
            <div className="grid grid-cols-1 lg:grid-cols-12 gap-6 inter-text">
              <div className="lg:col-span-4 space-y-6">
                <div className="panel panel-fuchsia p-4 text-center">

                      {data.jobs.map((job) => (
                        <div key={job.id} onClick={() => setActiveJobId(job.id)} className={`cursor-pointer p-3 rounded border text-left transition-all ${activeJobId === job.id ? 'border-fuchsia-500 bg-fuchsia-500/10 border-l-4' : 'border-zinc-800 hover:border-cyan-500 hover:bg-cyan-500/10'}`}>

          const handleInterestChange = (e) => setData({ ...data, interests: { ...data.interests, [e.target.name]: e.target.value } });
