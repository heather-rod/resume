    <!-- Tailwind CSS -->

</head>
<body class="bg-black text-slate-200 overflow-x-hidden w-full">
    
    <script>
        window.onerror = function(msg, url, lineNo) {
            document.getElementById('root').innerHTML = 
                "<div style='color:#ff00ff; font-family:monospace; padding:20px; border:2px solid #ff00ff; margin:10px; word-wrap: break-word;'>" +
                "<h2 style='font-size:20px; margin-bottom:10px;'>SYSTEM CRASH</h2>" +
                "<p><strong>Error:</strong> " + msg + "</p>" +
                "<p><strong>Line:</strong> " + lineNo + "</p>" +
                "</div>";
            return false;
        };
    </script>

    <div id="root">

            <span style="font-size: 14px; color: #cbd5e1; font-family: sans-serif;">
                (Loading system modules...)
            </span>
        </div>

                            background-image:

                                            </div>
                                        </div>
                                    </div>

        // --- RENDER APP ---

        if(rootElement) {

</body>
</html>
